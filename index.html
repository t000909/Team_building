<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamBuilding | Premium Strategic IT Partner</title>
    <link rel="icon" type="image/png" href="%BASE_URL%favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="shortcut icon" href="%BASE_URL%favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <link rel="preload" as="image" href="%BASE_URL%logo.png" id="logo-preload" />
    <link rel="preload" as="image" href="%BASE_URL%logo_footer.png" id="logo-footer-preload" />
    <script>
      (function() {
        var base = "%BASE_URL%";
        if (base.startsWith('.')) {
          var path = window.location.pathname;
          var segments = path.split('/');
          var lastSegment = segments[segments.length - 1];
          if (lastSegment.includes('.')) {
            segments.pop();
          }
          var dir = segments.join('/');
          if (!dir.endsWith('/')) {
            dir += '/';
          }
          base = window.location.origin + dir;
        } else if (base.startsWith('/')) {
          base = window.location.origin + base;
        }
        window.__LOGO_URL__ = base + 'logo.png';
        window.__LOGO_FOOTER_URL__ = base + 'logo_footer.png';
      })();
    </script>
    <script id="patch-fetch">
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Unable to patch window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
